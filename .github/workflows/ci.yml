name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@cc0f56c35b75d0975ed5d9e29005fae707721cd5 # v1

      - name: Install Qt 6
        uses: jurplel/install-qt-action@d325aaf2a8baeeda41ad0b5d39f84a6af9bcf005 # v4.3.0
        with:
          version: '6.10.2'
          modules: 'qtwebengine qtwebchannel qtwebsockets qtpositioning'
          cache: true

      - name: Cache xmake packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.xmake/packages
            ~/AppData/Local/.xmake/packages
          key: xmake-${{ runner.os }}-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install web dependencies
        run: bun install && cd web && bun install

      - name: Configure xmake
        run: xmake config -y

      - name: Build desktop app
        run: xmake build desktop

      - name: Build dev-server
        run: xmake build dev-server

      - name: Run C++ unit tests
        run: xmake run test-todo-store

      - name: Run TypeScript unit tests
        run: xmake run test-bun

      - name: Get Playwright version and cache paths
        shell: bash
        run: |
          PW_VER=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "PLAYWRIGHT_VERSION=$PW_VER" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_BROWSERS_PATH=${LOCALAPPDATA:-$HOME/.cache}/ms-playwright" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: xmake run test-browser
        env:
          CI: 'true'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ runner.os }}
          path: test-results/
          if-no-files-found: ignore
