name: Nightly Release

on:
  schedule:
    - cron: '0 6 * * *' # every day at 6 AM UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Check if there were any commits in the last 24 hours — skip if not
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for recent commits
        id: check
        run: |
          RECENT=$(git log --oneline --since="24 hours ago" | head -1)
          if [ -n "$RECENT" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Found recent commits — building nightly"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 24 hours — skipping nightly"
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
          - os: windows-latest
            artifact: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@cc0f56c35b75d0975ed5d9e29005fae707721cd5 # v1

      # Still on node20 — track: https://github.com/jurplel/install-qt-action/releases
      - name: Install Qt 6
        uses: jurplel/install-qt-action@d325aaf2a8baeeda41ad0b5d39f84a6af9bcf005 # v4.3.0 (node20)
        with:
          version: '6.10.2'
          modules: 'qtwebengine qtwebchannel qtwebsockets qtpositioning'
          cache: true

      - name: Cache xmake packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.xmake/packages
            ~/AppData/Local/.xmake/packages
          key: xmake-${{ runner.os }}-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install web dependencies
        run: bun install && cd web && bun install

      - name: Configure xmake
        run: xmake config -y

      - name: Build desktop app
        run: xmake build desktop

      - name: Build dev-server
        run: xmake build dev-server

      - name: Run C++ unit tests
        run: xmake run test-todo-store

      - name: Run TypeScript unit tests
        run: xmake run test-bun

      - name: Get Playwright version and cache paths
        shell: bash
        run: |
          PW_VER=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "PLAYWRIGHT_VERSION=$PW_VER" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_BROWSERS_PATH=${LOCALAPPDATA:-$HOME/.cache}/ms-playwright" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: xmake run test-browser
        env:
          CI: 'true'

      - name: Locate built binary
        id: binary
        shell: bash
        run: |
          BINARY_PATH=$(cat build/.desktop-binary.txt)
          echo "path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
          echo "dir=$(dirname "$BINARY_PATH")" >> "$GITHUB_OUTPUT"

      - name: Generate nightly tag
        id: tag
        shell: bash
        run: echo "name=nightly-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Bundle Qt dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          windeployqt "${{ steps.binary.outputs.path }}" \
            --no-translations --no-opengl-sw --no-system-d3d-compiler

      - name: Bundle Qt dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_BUNDLE="release/Delightful Qt Web Shell.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          cp "${{ steps.binary.outputs.path }}" "$APP_BUNDLE/Contents/MacOS/Delightful Qt Web Shell"

          cat > "$APP_BUNDLE/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Delightful Qt Web Shell</string>
            <key>CFBundleIdentifier</key>
            <string>com.myorganization.delightful-qt-web-shell</string>
            <key>CFBundleName</key>
            <string>Delightful Qt Web Shell</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          macdeployqt "$APP_BUNDLE"

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "${{ steps.binary.outputs.dir }}"
          7z a "$GITHUB_WORKSPACE/delightful-qt-web-shell-${{ steps.tag.outputs.name }}-windows-x64.zip" *

      - name: Package release (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd release
          zip -r "$GITHUB_WORKSPACE/delightful-qt-web-shell-${{ steps.tag.outputs.name }}-macos-x64.zip" "Delightful Qt Web Shell.app"

      - name: Upload release artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.artifact }}
          path: |
            *.zip

  publish:
    timeout-minutes: 5
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate nightly tag
        id: tag
        shell: bash
        run: echo "name=nightly-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true

      - name: Clean up previous nightly
        run: gh release delete "${{ steps.tag.outputs.name }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Still on node20 — track: https://github.com/softprops/action-gh-release/releases
      - name: Create nightly pre-release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0 (node20)
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Nightly ${{ steps.tag.outputs.name }}"
          body: "Automated nightly build from `main` at ${{ steps.tag.outputs.name }}."
          prerelease: true
          files: |
            *.zip
