name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
          - os: windows-latest
            artifact: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@cc0f56c35b75d0975ed5d9e29005fae707721cd5 # v1

      - name: Install Qt 6
        uses: jurplel/install-qt-action@d325aaf2a8baeeda41ad0b5d39f84a6af9bcf005 # v4.3.0
        with:
          version: '6.10.2'
          modules: 'qtwebengine qtwebchannel qtwebsockets qtpositioning'
          cache: true

      - name: Cache xmake packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.xmake/packages
            ~/AppData/Local/.xmake/packages
          key: xmake-${{ runner.os }}-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install web dependencies
        run: bun install && cd web && bun install

      - name: Configure xmake
        run: xmake config -y

      - name: Build desktop app
        run: xmake build desktop

      - name: Build dev-server
        run: xmake build dev-server

      - name: Run C++ unit tests
        run: xmake run test-todo-store

      - name: Run TypeScript unit tests
        run: xmake run test-bun

      - name: Get Playwright version and cache paths
        shell: bash
        run: |
          PW_VER=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "PLAYWRIGHT_VERSION=$PW_VER" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_BROWSERS_PATH=${LOCALAPPDATA:-$HOME/.cache}/ms-playwright" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: xmake run test-browser
        env:
          CI: 'true'

      - name: Locate built binary
        id: binary
        shell: bash
        run: |
          BINARY_PATH=$(cat build/.desktop-binary.txt)
          echo "path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
          echo "dir=$(dirname "$BINARY_PATH")" >> "$GITHUB_OUTPUT"

      # Qt apps need their DLLs/frameworks bundled — the binary alone won't launch.
      # windeployqt/macdeployqt scan imports and copy everything needed.
      - name: Bundle Qt dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          windeployqt "${{ steps.binary.outputs.path }}" \
            --no-translations --no-opengl-sw --no-system-d3d-compiler

      - name: Bundle Qt dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # xmake builds a bare binary on macOS — create .app bundle structure
          APP_BUNDLE="release/Delightful Qt Web Shell.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          cp "${{ steps.binary.outputs.path }}" "$APP_BUNDLE/Contents/MacOS/Delightful Qt Web Shell"

          # Minimal Info.plist
          cat > "$APP_BUNDLE/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Delightful Qt Web Shell</string>
            <key>CFBundleIdentifier</key>
            <string>com.myorganization.delightful-qt-web-shell</string>
            <key>CFBundleName</key>
            <string>Delightful Qt Web Shell</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          macdeployqt "$APP_BUNDLE"

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "${{ steps.binary.outputs.dir }}"
          7z a "$GITHUB_WORKSPACE/delightful-qt-web-shell-${{ github.ref_name }}-windows-x64.zip" *

      - name: Package release (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd release
          zip -r "$GITHUB_WORKSPACE/delightful-qt-web-shell-${{ github.ref_name }}-macos-x64.zip" "Delightful Qt Web Shell.app"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.artifact }}
          path: |
            *.zip

  publish:
    timeout-minutes: 5
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            *.zip
